name: Deploy to Cloudflare Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "cloudflare-pages-${{ github.ref }}"
  cancel-in-progress: true

env:
  CLOUDFLARE_ACCOUNT_ID: 480b9599b0a599f477e74551a1f82761
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_PROJECT_NAME: japanese-practice

jobs:
  deploy:
    environment:
      name: cloudflare-pages
      url: https://japanese.wrick17.com
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Check formatting
        run: bun run format:check
      - name: Lint
        run: bun run lint
      - name: Test
        run: bun run test
      - name: Build
        run: bun run build
      - name: Deploy to Cloudflare Pages
        if: env.CLOUDFLARE_API_TOKEN != ''
        run: bunx wrangler pages deploy dist --project-name "${CLOUDFLARE_PROJECT_NAME}" --branch "${GITHUB_REF_NAME}" --commit-hash "${GITHUB_SHA}"
      - name: Skip deploy without Cloudflare token
        if: env.CLOUDFLARE_API_TOKEN == ''
        run: echo "CLOUDFLARE_API_TOKEN is not configured; validation passed, deploy skipped."
